<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>僕のヒーローアカデミア</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

a{
    text-decoration:none;
    color:black;
}
</style>
</head>

<body>

<header>
<h1>僕のヒーローアカデミア</h1>
<p>シリーズ一覧</p>
</header>

<div class="container">

<div class="grid">

<a href="#">
<div class="card">
HEROES PLUS
</div>
</a>

<a href="#">
<div class="card">
THE EVIL VILLAINS
</div>
</a>

<a href="#">
<div class="card">
GLITTER & GLAMOURS
</div>
</a>

<a href="#">
<div class="card">
AGE OF HEROES
</div>
</a>

<a href="#">
<div class="card">
Break Time Collection
</div>
</a>

<a href="#">
<div class="card">
Amazing Heroes
</div>
</a>

</div>

</div>

</body>
</html>
